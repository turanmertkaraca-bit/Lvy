name: build-apk

# This workflow builds the AnimeStream APK in the cloud.
# You don't need a terminal — just push to GitHub and download the APK
# from the Actions tab when the build finishes.

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:  # allows manual "Run workflow" button

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Fix script permissions
        # GitHub's web uploader doesn't preserve the executable bit on .sh files.
        # Restore it here so buildall.sh and all the dependency build scripts can run.
        run: |
          chmod +x buildscripts/buildall.sh
          chmod +x buildscripts/include/*.sh
          chmod +x buildscripts/scripts/*.sh
          chmod +x buildscripts/*.sh 2>/dev/null || true
          find buildscripts -name "*.sh" -exec chmod +x {} \;
          chmod +x gradlew
          chmod +x fetch_extra_shaders.sh 2>/dev/null || true
          echo "=== Script permissions set ==="
          ls -la buildscripts/buildall.sh buildscripts/scripts/mbedtls.sh

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Export cache identifier
        run: buildscripts/include/ci.sh export >>$GITHUB_ENV

      - name: Cache built prefix (ffmpeg, libplacebo, etc.)
        uses: actions/cache@v4
        with:
          path: gh-cache/
          key: "${{ env.CACHE_IDENTIFIER }}-arm64-v2"
          enableCrossOsArchive: true

      - name: Install build packages
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf pkgconf libtool ninja-build python3-pip gperf
          sudo pip3 install meson

      - name: Set up SDK, NDK, and dependencies
        run: |
          # Double-check permissions before running ci.sh (it sources other scripts)
          find buildscripts -name "*.sh" -exec chmod +x {} \;
          mkdir -p "$CACHE_FOLDER"
          buildscripts/include/ci.sh install
        env:
          CACHE_MODE: "folder"
          CACHE_FOLDER: "${{ github.workspace }}/gh-cache"

      - name: Build libmpv + dependencies for arm64 (your Reno 11F CPU)
        run: |
          find buildscripts -name "*.sh" -exec chmod +x {} \;
          buildscripts/buildall.sh --arch arm64 mpv

      - name: Build APK (capture errors)
        run: |
          find buildscripts -name "*.sh" -exec chmod +x {} \;
          # Run the build and capture ALL output to a log file
          buildscripts/buildall.sh -n 2>&1 | tee build-full-output.log
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            echo ""
            echo "========================================"
            echo "BUILD FAILED — extracting error lines:"
            echo "========================================"
            # Show all Kotlin compile errors (lines starting with "e:")
            grep -E "^e: |^w: .*error|error:|FAILURE:|What went wrong" build-full-output.log || true
            echo ""
            echo "========================================"
            echo "Full context around first error:"
            echo "========================================"
            grep -n "^e: " build-full-output.log | head -5 || true
            exit $BUILD_EXIT
          fi

      - name: Upload full build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: full-build-log
          path: build-full-output.log
          if-no-files-found: ignore
          retention-days: 7

      - name: List built APKs
        run: |
          echo "=== Built APKs ==="
          find app/build/outputs/apk -name "*.apk" -exec ls -lh {} \; || true

      - name: Upload arm64 APK (for Reno 11F)
        uses: actions/upload-artifact@v4
        with:
          name: animestream-arm64-apk
          path: app/build/outputs/apk/default/debug/app-default-arm64-v8a-debug.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload universal APK (backup, works on any device)
        uses: actions/upload-artifact@v4
        with:
          name: animestream-universal-apk
          path: app/build/outputs/apk/default/debug/app-default-universal-debug.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload all APKs (fallback if specific arch name is wrong)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: all-apks
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            buildscripts/**/*.log
            deps/
            prefix/
          if-no-files-found: ignore
          retention-days: 7
